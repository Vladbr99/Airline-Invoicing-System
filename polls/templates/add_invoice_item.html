{% extends 'base.html' %}

{% block content %}
<h2>Add Item to Invoice #{{ invoice.id }}</h2>

<form method="POST">
    {% csrf_token %}

    <div>
        <label>Select Flight</label><br>
        <select name="flight">
            {% for flight in flights %}
            <option value="{{ flight.id }}">
                {{ flight.flight_number }} - {{ flight.origin }} → {{ flight.destination }} (€{{ flight.base_price }})
            </option>
            {% endfor %}
        </select>
    </div>

    <br>

    <div>
        <label>Quantity</label><br>
        <input type="number" name="quantity" value="1" min="1">
    </div>

    <br>
    <button class="btn">Add Item</button>
</form>
{% endblock %}
