{% extends 'base.html' %}

{% block content %}
<h2>Update Invoice Status</h2>

<form method="POST">
    {% csrf_token %}

    <div>
        <label>Status</label><br>
        <select name="status">
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
        </select>
    </div>

    <br>
    <button class="btn">Update</button>
</form>
{% endblock %}
