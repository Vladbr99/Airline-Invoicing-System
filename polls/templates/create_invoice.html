{% extends 'base.html' %}

{% block content %}
<h1>Create Invoice</h1>

<style>
select, input {
     margin-top: 10px; 
     margin-bottom: 10px; 
     }
     
</style>

<form method="POST">
    {% csrf_token %}

    <label>Select Customer:</label><br>
    <select name="customer">
        {% for customer in customers %}
        <option value="{{ customer.id }}">{{ customer.name }}</option>
        {% endfor %}
    </select>

    <br>
    <button type="submit" class="btn">Create Invoice</button>
</form>
{% endblock %}
